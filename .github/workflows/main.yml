name: Next Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@master
        with:
          host: 58.229.253.89
          username: gjworks
          key: ${{ secrets.PRIVATE_KEY }}
          port: 2022
          script: |
            cd public_html/
            git pull
            npm install
            npm run build
            pm2 restart gjworks

name: Next Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code.
        uses: actions/checkout@main

      - name: Install Dependencies
        run: npm install

      - name: Build Next App
        run: npm run build

      - name: pm2
        run: pm2 restart gjworks
